services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./fastapi.conf:/etc/nginx/conf.d/fastapi.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # 호스트 실제 경로 직접 마운트
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
    environment:
    - TZ=Asia/Seoul
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 64m

  api:
    # image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    image: ${DOCKERHUB_USERNAME}/milkyway_bot:latest
    expose:
      - 8000
    volumes:
      - ./logs:/app/logs  # 컨테이너 /app/logs → 호스트 ./logs
    env_file:
      - .env
    environment:
    - TZ=Asia/Seoul
    depends_on:
      - db
      - redis
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"  # 파일 한 개당 최대 10MB
        max-file: "3"    # 최대 3개까지만 보관 (총 30MB)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300m
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request, sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\").getcode() == 200 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # 갱신 자동화
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; docker compose restart nginx; sleep 48h & wait $${!}; done;'"
    networks:
      - app-network

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Seoul
      - PGTZ=Asia/Seoul
    # 1GB 서버에 맞게 메모리 튜닝 (기본값: shared_buffers=128MB, max_connections=100)
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c max_connections=20
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:6
    command: redis-server --appendonly yes --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 64m
    logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"

networks:
  app-network:
    driver: bridge
    enable_ipv6: false

volumes:
  postgres_data:
  redis_data: